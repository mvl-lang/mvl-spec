name: Publish mvl-lsp

# Triggered by tags matching `lsp-v*` (e.g. lsp-v0.1.0).
# Publishes tools/lsp/ to PyPI as `mvl-lsp`.
#
# SKELETON — PYPI_API_TOKEN not yet configured.  The publish step is
# gated behind `if: false` until real credentials are wired up.

on:
  push:
    tags:
      - "lsp-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: tools/lsp
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/lsp-v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade pip build twine

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::pyproject.toml version ($MANIFEST_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        if: false   # ← flip to `true` once PYPI_API_TOKEN is configured
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: mvl-lsp ${{ steps.version.outputs.version }}
          body_path: tools/lsp/CHANGELOG.md
          draft: false
          prerelease: false
