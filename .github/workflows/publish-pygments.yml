name: Publish pygments-mvl

# Triggered by tags matching `pygments-v*` (e.g. pygments-v0.1.0).
# Publishes tools/pygments/ to PyPI as `pygments-mvl`.
#
# SKELETON — the pygments lexer does not exist yet (tracked in #1).
# When the lexer lands, wire PYPI_API_TOKEN and flip `if: false` → `true`.

on:
  push:
    tags:
      - "pygments-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: tools/pygments
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/pygments-v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade pip build twine

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::pyproject.toml version ($MANIFEST_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        if: false   # ← flip to `true` once PYPI_API_TOKEN is configured
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: pygments-mvl ${{ steps.version.outputs.version }}
          body_path: tools/pygments/CHANGELOG.md
          draft: false
          prerelease: false
