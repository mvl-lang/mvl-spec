name = "MVL"
grammar = "mvl"
path_suffixes = ["mvl"]
line_comments = ["// "]

# Auto-close bracket pairs
[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "("
end = ")"
close = true
newline = false

[[brackets]]
start = "["
end = "]"
close = true
newline = false

[[brackets]]
start = "\""
end = "\""
close = true
newline = false

[[brackets]]
start = "'"
end = "'"
close = true
newline = false

# Lambda parameter pipes — only auto-close when at start of lambda
[[brackets]]
start = "|"
end = "|"
close = false
newline = false
