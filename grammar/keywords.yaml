# MVL Reserved Keywords — Single Source of Truth
#
# This file is the canonical list of MVL reserved keywords, organized by
# semantic category. All parsers, lexers, and syntax highlighters MUST
# generate their keyword tables from this file.
#
# Consumers:
#   - mvl-lang/tree-sitter-mvl grammar.js (via tools/generators/gen_tree_sitter.js)
#   - tools/pygments/mvl_pygments/        (via tools/generators/gen_pygments.py)
#   - editors/vscode/syntaxes/            (via tools/generators/gen_vscode.js)
#   - The MVL compiler (mvl/src/mvl/parser/lexer.rs) — currently hand-maintained,
#     to be regenerated from this file as a future consistency-check target.
#
# Rule: adding a keyword requires updating this file + the EBNF in
# grammar.ebnf in the same PR. Drift is a CI failure (see .github/workflows/
# check-drift.yml).

declaration:
  - fn
  - type
  - const
  - use
  - pub
  - extern
  - impl
  - builtin
  - struct
  - enum
  - actor
  - effect
  - test

totality:
  - total
  - partial

cast:
  - as

control_flow:
  - if
  - else
  - for
  - in
  - while
  - match
  - return
  - select

let_binding:
  - let
  - ghost

ownership:
  - iso
  - val
  - ref
  - tag
  - consume

ifc:
  - label
  - relabel
  # Note: `declassify` and `sanitize` were removed under #894.
  # Use `relabel name(expr, "TAG")` with a declared transition instead.

boolean:
  - "true"
  - "false"

refinements:
  - where
  - self
  - old
  - requires
  - ensures
  - invariant
  - with
  - decreases
  - forall
  - exists

pattern:
  - Some
  - None
  - Ok
  - Err

# Type-level identifiers that are effectively reserved by convention
# (not enforced as reserved words by the lexer, but users should not shadow).
builtin_types:
  - Int
  - Int8
  - Int16
  - Int32
  - Int64
  - UInt8
  - UInt16
  - UInt32
  - UInt64
  - Float
  - Float32
  - Float64
  - Bool
  - Char
  - Byte
  - String
  - Unit
  - Option
  - Result
  - List
  - Array
  - Map
  - Set

# Stdlib IFC labels — ordinary identifiers, NOT reserved words. Pre-seeded
# into the parser's known-label set so `Tainted[T]` / `Secret[T]` parse as
# labeled types without needing an explicit `label` declaration. User code
# can extend the set with `label Foo;` (see `ifc:` above).
#
# `Public` is NOT a stdlib label — an unlabeled type is public by default.
stdlib_labels:
  - Tainted
  - Secret
  # Capability labels (#931):
  - ConfigPath
  - DbUrl
  - ApiEndpoint
  - AuditTarget
